<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SealAI Region/workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="brand-block">
          <span class="brand-logo" aria-hidden="true"></span>
          <strong>SealAI</strong>
        </div>

        <div class="header-actions">
          <div class="header-indicators" aria-hidden="true">
            <span class="header-indicator"></span>
            <span class="header-indicator"></span>
          </div>
          <button class="header-icon-button" type="button" aria-label="返回桌面" title="返回桌面">
            <span class="material-symbols-outlined">desktop_windows</span>
          </button>
          <button class="header-icon-button" type="button" aria-label="通知" title="通知">
            <span class="material-symbols-outlined">notifications</span>
          </button>
          <button id="planButton" class="header-plan-button" type="button">Plan</button>
          <button class="header-icon-button" type="button" aria-label="设置" title="设置">
            <span class="material-symbols-outlined">settings</span>
          </button>
        </div>
      </header>

      <div class="app-main">
        <aside class="side-rail">
          <div id="navFilters" class="side-rail-panel"></div>
        </aside>

        <main class="canvas-shell">
          <div id="canvasStage" class="canvas-stage">
            <div id="canvasWorld" class="canvas-world">
              <div class="canvas-grid"></div>
              <svg id="edgeLayer" class="edge-layer" aria-hidden="true">
                <defs>
                  <marker
                    id="edge-arrow"
                    viewBox="0 0 10 10"
                    refX="8"
                    refY="5"
                    markerWidth="6"
                    markerHeight="6"
                    orient="auto-start-reverse"
                  >
                    <path d="M 0 0 L 10 5 L 0 10 z"></path>
                  </marker>
                </defs>
              </svg>
              <div id="nodeLayer" class="node-layer"></div>
            </div>
            <section id="canvasWorkspace" class="canvas-workspace" hidden></section>
          </div>
          <div class="canvas-hud" aria-hidden="false">
            <div class="canvas-toolbar">
              <button type="button" class="canvas-tool-button" data-canvas-control="focus" title="居中画布" aria-label="居中画布">
                <span class="material-symbols-outlined">near_me</span>
              </button>
              <button type="button" class="canvas-tool-button" data-canvas-control="fit" title="重置缩放" aria-label="重置缩放">
                <span class="material-symbols-outlined">fit_screen</span>
              </button>
              <button type="button" class="canvas-tool-button" data-canvas-control="zoom-in" title="放大" aria-label="放大">
                <span class="material-symbols-outlined">add</span>
              </button>
              <button type="button" class="canvas-tool-button" data-canvas-control="zoom-out" title="缩小" aria-label="缩小">
                <span class="material-symbols-outlined">remove</span>
              </button>
            </div>
            <div class="canvas-minimap">
              <div class="canvas-minimap-grid"></div>
              <div id="canvasMinimapNodes" class="canvas-minimap-nodes"></div>
              <div id="canvasMinimapViewport" class="canvas-minimap-viewport"></div>
            </div>
          </div>
        </main>

        <aside class="chat-shell">
          <div id="chatTitle" class="chat-title">聊天</div>
          <div id="chatScroll" class="chat-scroll">
            <section id="chatContext" class="chat-context" hidden></section>
            <div id="chatLog" class="chat-log"></div>
          </div>

          <form id="chatForm" class="chat-form">
            <textarea
              id="chatInput"
              class="chat-input"
              rows="5"
              placeholder="输入 GitHub 仓库、镜像、数据库需求，或让 Agent 修复部署失败"
            ></textarea>
            <div class="chat-actions">
              <div id="chatToolDock" class="chat-tool-dock"></div>
              <button type="submit" class="send-button">发送</button>
            </div>
          </form>
        </aside>
      </div>
    </div>

    <section id="planOverlay" class="plan-overlay" hidden>
      <div class="plan-backdrop" data-plan-close="true"></div>
      <div class="plan-panel" role="dialog" aria-modal="true" aria-labelledby="planTitle">
        <div class="plan-panel-head">
          <div class="plan-panel-copy">
            <span class="plan-panel-kicker">Subscription</span>
            <h2 id="planTitle" class="plan-panel-title">Upgrade Plan</h2>
          </div>
          <button class="plan-close-button" type="button" data-plan-close="true" aria-label="关闭">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>

        <div class="plan-offer-bar">
          <div class="plan-offer-copy">
            <strong>限时优惠</strong>
            <span>30 分钟内订阅 Starter，首月 $1，后续 $7；超时后恢复为 $7/月。</span>
          </div>
          <div id="planCountdown" class="plan-countdown">30:00</div>
        </div>

        <div id="planGrid" class="plan-grid"></div>
      </div>
    </section>

    <section id="windowOverlay" class="window-overlay" hidden>
      <div id="windowBody" class="window-overlay-body"></div>
    </section>

    <script src="./app.js"></script>
  </body>
</html>
